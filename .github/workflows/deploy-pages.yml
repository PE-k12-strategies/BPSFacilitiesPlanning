name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout dashboard
        uses: actions/checkout@v4

      - name: Write config.local.js
        env:
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          if [ -z "$MAPBOX_ACCESS_TOKEN" ]; then
            echo "::error::Set repository secret MAPBOX_ACCESS_TOKEN (Mapbox public pk. token)."
            exit 1
          fi
          printf 'window.MAPBOX_ACCESS_TOKEN = "%s";\n' "$MAPBOX_ACCESS_TOKEN" > config.local.js

      - name: Ensure school_master.csv is present
        env:
          TOKEN: ${{ secrets.PRIVATE_DATA_PAT }}
        run: |
          mkdir -p data
          if [ -f data/school_master.csv ]; then
            echo "Using school_master.csv from public repo ($(wc -c < data/school_master.csv) bytes)"
            exit 0
          fi
          if [ -n "$TOKEN" ]; then
            curl -fsSL \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              "https://api.github.com/repos/PE-k12-strategies/BPSFacilitiesPlanning-Public_PrivateData/contents/data/school_master.csv?ref=main" \
              -o data/school_master.csv
            echo "Downloaded school_master.csv from private repo ($(wc -c < data/school_master.csv) bytes)"
            exit 0
          fi
          echo "::error::data/school_master.csv is missing. Commit it to this repo or set PRIVATE_DATA_PAT."
          exit 1

      - name: Prepare Pages site
        run: touch .nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
