name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard
        uses: actions/checkout@v4

      - name: Write config.local.js
        env:
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          if [ -z "$MAPBOX_ACCESS_TOKEN" ]; then
            echo "::error::Set repository secret MAPBOX_ACCESS_TOKEN (Mapbox public pk. token)."
            exit 1
          fi
          printf 'window.MAPBOX_ACCESS_TOKEN = "%s";\n' "$MAPBOX_ACCESS_TOKEN" > config.local.js

      - name: Fetch school_master.csv from private repo
        env:
          TOKEN: ${{ secrets.PRIVATE_DATA_PAT }}
        run: |
          mkdir -p data
          if [ -z "$TOKEN" ]; then
            echo "::warning::PRIVATE_DATA_PAT not set — school stats will be missing on the live site."
            exit 0
          fi
          curl -fsSL \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/PE-k12-strategies/BPSFacilitiesPlanning-Public_PrivateData/contents/data/school_master.csv?ref=main" \
            -o data/school_master.csv
          echo "Downloaded school_master.csv ($(wc -c < data/school_master.csv) bytes)"

      - name: Prepare Pages site
        run: touch .nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          exclude_assets: |
            .github
            scripts
            data/raw
            data/sourcedocs
            MSID_Lookup.csv
            MSID_Lookup.xlsx
            config.local.js.example
