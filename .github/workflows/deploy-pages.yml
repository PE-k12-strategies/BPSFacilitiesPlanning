name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout dashboard
        uses: actions/checkout@v4

      - name: Write config.local.js
        env:
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          if [ -z "$MAPBOX_ACCESS_TOKEN" ]; then
            echo "::error::Set repository secret MAPBOX_ACCESS_TOKEN (Mapbox public pk. token)."
            exit 1
          fi
          printf 'window.MAPBOX_ACCESS_TOKEN = "%s";\n' "$MAPBOX_ACCESS_TOKEN" > config.local.js

      - name: Resolve school_master.csv for shard build
        env:
          TOKEN: ${{ secrets.PRIVATE_DATA_PAT }}
        run: |
          mkdir -p data
          if [ -f data/school_master.csv ]; then
            echo "Using committed CSV is not expected; shards in repo are preferred."
          fi
          if [ -n "$TOKEN" ]; then
            curl -fsSL \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              "https://api.github.com/repos/PE-k12-strategies/BPSFacilitiesPlanning-Public_PrivateData/contents/data/school_master.csv?ref=main" \
              -o data/school_master.csv || true
          fi
          if [ ! -f data/school_master.csv ]; then
            echo "No CSV for shard rebuild; using school_master_index.json already in repo."
            exit 0
          fi
          python3 scripts/export_school_master_shards.py
          rm -f data/school_master.csv
          echo "Rebuilt JSON shards from private CSV."

      - name: Verify school master shards
        run: |
          test -f data/processed/school_master_index.json
          count=$(ls -1 data/processed/school_master_d/*.json 2>/dev/null | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "::error::Missing school master JSON shards. Run: py -3 scripts/export_school_master_shards.py"
            exit 1
          fi
          echo "Found $count school master shard(s)."

      - name: Prepare Pages site
        run: touch .nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
